<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Brief</title>
</head>
<body>

    <button onclick="starteProzess()">Start</button>

    <p id="output">Warten...</p>

    <script src="brief.js"></script>

    <script>
        function starteProzess() {
            const output = document.getElementById("output");

            output.textContent = "Hole Brief...";

            holeBrief("Hallo Welt")
                .then((brief) => {
                    output.textContent = "Stemple...";
                    return stempelBrief(brief);
                })
                .then((brief) => {
                    output.textContent = "Versende...";
                    return versendeBrief(brief);
                })
                .then((fertigerBrief) => {
                    output.textContent = fertigerBrief;
                })
                .catch(() => {
                    output.textContent = "Fehler!";
                });
        }
    </script>

</body>
</html>
