<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>GlücksBall Forum</title>
  <link rel="icon" href="image/Logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css?v=22">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <header class="header">
    <h1>GlücksBall</h1>
    <p><strong>Der Ort für Analysen, Provokationen und schlechte Ausreden.</strong></p>

    <nav class="nav">
      <a href="index.html">Start</a>
      <a href="fussballmeisterschaften.html">Meisterschaften</a>
      <a href="tipps.html">Ehrentipps</a>
      <a href="spasstipp.html">Spaßtipps</a>
      <a href="ranking.html">Ranking</a>
      <a href="fussball-news.html">News</a>
      <a href="forum.html" class="active">Forum</a>
      <a href="regeln.html">Regeln</a>

      

      <div class="auth-area" id="authArea">
        <div class="auth-status" id="authStatus">
          <span class="led" id="loginLed" aria-label="Login Status"></span>
          <span class="auth-name" id="navUsername">Gast</span>
        </div>

        <div id="authGuest">
          <button id="authToggle" class="btn btn-ghost" type="button">Login</button>
          <div class="auth-box" id="authBox">
            <form id="loginForm">
              <h3>Login</h3>
              <input type="text" id="loginName" placeholder="Benutzername" required>
              <input type="password" id="loginPass" placeholder="Passwort" required>
              <button class="btn" type="submit">Login</button>
            </form>
          </div>
        </div>

        <div id="authUser" style="display:none;">
          <button id="logoutBtn" class="btn btn-ghost" type="button">Logout</button>
        </div>
      </div>

      <button id="themeToggle" class="btn btn-ghost" type="button">Lightmode</button>
    </nav>
  </header>
  <aside class="news-ad forum-ad forum-ad-left" aria-label="Werbung links">
    <a href="https://www.spengergasse.at/" target="_blank" rel="noopener">
      <img src="image/werbung.png" alt="Werbung Spengergasse">
    </a>
  </aside>

  <aside class="news-ad forum-ad forum-ad-right" aria-label="Werbung rechts">
    <a href="https://www.spengergasse.at/" target="_blank" rel="noopener">
      <img src="image/werbung.png" alt="Werbung Spengergasse">
    </a>
  </aside>
  <main class="page forum-page">
    <h1>Forum</h1>
    <p class="muted">Gemeinsamer Chatraum für Nachrichten, Diskussionen und kurze Ansagen.</p>

    <section class="forum-shell">
      <div class="forum-toolbar">
        <span id="forumStatus" class="notice">Lade Chat...</span>
        <button id="forumRefresh" class="btn btn-ghost" type="button">Aktualisieren</button>
      </div>

      <div id="forumMessages" class="forum-messages" aria-live="polite"></div>

      <form id="forumForm" class="forum-form">
        <input id="forumInput" type="text" maxlength="500" placeholder="Nachricht schreiben..." autocomplete="off">
        <button class="btn" type="submit">Senden</button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/forum.js?v=2"></script>
</body>
</html>
