<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glücksball - Freigaben</title>
    <link rel="icon" href="image/Logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css?v=9">
    <script src="js/admin_freigabe.js?v=2" defer></script>
</head>
<body>
    <header class="header">
        <h1>GlücksBall</h1>
        <p><strong>Registrierungen prüfen und freigeben</strong></p>
        <nav class="nav">
            <a href="index.html">Start</a>
            <a href="ranking.html">Ranking</a>
        </nav>
    </header>

    <main class="page admin-page">
        <section class="card">
            <h1>Registrierungen freigeben</h1>
            <form id="adminLoginForm" class="form">
                <input type="password" id="adminPassword" placeholder="Admin-Passwort" required>
                <button class="btn" type="submit">Anfragen laden</button>
            </form>
            <p id="adminMessage" style="color:var(--muted);"></p>
        </section>

        <section class="card">
            <h2>Offene Anfragen</h2>
            <div id="pendingUsers" class="pending-users"></div>
        </section>
    </main>
</body>
</html>
