<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlücksBall - Freigaben</title>
    <link rel="icon" href="image/Logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css?v=22">
    <script src="js/app.js?v=10" defer></script>
    <script src="js/admin_freigabe.js?v=3" defer></script>
</head>

<body>
    <header class="header">
        <h1>GlücksBall</h1>
        <p><strong>Admin Qualitätskontrolle!</strong></p>

        <nav class="nav">
            <a href="index.html">Start</a>
            <a href="fussballmeisterschaften.html">Meisterschaften</a>
            <a href="tipps.html">Ehrentipps</a>
            <a href="spasstipp.html">Spaßtipps</a>
            <a href="ranking.html">Ranking</a>
            <a href="fussball-news.html">News</a>
            <a href="forum.html">Forum</a>
            <a href="regeln.html">Regeln</a>

            <div class="auth-area" id="authArea">
                <div class="auth-status" id="authStatus">
                    <span class="led" id="loginLed" aria-label="Login Status"></span>
                    <span class="auth-name" id="navUsername">Gast</span>
                </div>

                <div id="authGuest">
                    <button id="authToggle" class="btn btn-ghost" type="button">Login</button>
                    <div class="auth-box" id="authBox">
                        <form id="loginForm">
                            <h3>Login</h3>
                            <input type="text" id="loginName" placeholder="Benutzername" required>
                            <input type="password" id="loginPass" placeholder="Passwort" required>
                            <button class="btn" type="submit">Login</button>
                        </form>
                    </div>
                </div>

                <div id="authUser" style="display:none;">
                    <button id="logoutBtn" class="btn btn-ghost" type="button">Logout</button>
                </div>
            </div>

            <button id="themeToggle" class="btn btn-ghost" type="button">Lightmode</button>
        </nav>
    </header>

    <main class="page admin-page">
        <section class="card">
            <h1>Admin-Bereich</h1>
            <form id="adminLoginForm" class="form">
                <input type="password" id="adminPassword" placeholder="Admin-Passwort" required>
                <button class="btn" type="submit">Einloggen</button>
            </form>
            <p id="adminMessage" style="color:var(--muted);"></p>
        </section>

        <section class="card" id="adminPanel" style="display:none;">
            <h2>Offene Anfragen</h2>
            <div id="pendingUsers" class="pending-users"></div>

            <hr class="line">

            <h2>Aktive User</h2>
            <div id="activeUsers" class="pending-users"></div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 GlücksBall – Fußball-Tippspiel</p>
    </footer>
</body>

</html>
