<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Passwort neu setzen - GlücksBall</title>
  <link rel="icon" href="image/Logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css?v=11">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <header class="header">
    <h1>GlücksBall</h1>
    <p><strong>Passwort neu setzen</strong></p>

    <nav class="nav">
      <a href="index.html">Start</a>
      <a href="tipps.html">Ehrentipps</a>
      <a href="spasstipp.html">Spaßtipps</a>
      <a href="ranking.html">Ranking</a>
      <button id="themeToggle" class="btn btn-ghost" type="button">Lightmode</button>
    </nav>
  </header>

  <main class="layout onecol">
    <section class="card reset-card">
      <h2>Neues Passwort</h2>
      <p class="muted" id="resetInfo">Gib dein neues Passwort ein.</p>

      <form id="resetPasswordForm" class="form reset-form">
        <input type="password" id="newPassword" placeholder="Neues Passwort" required>
        <input type="password" id="newPasswordRepeat" placeholder="Neues Passwort wiederholen" required>
        <button class="btn" type="submit">Passwort setzen</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 GlücksBall</p>
  </footer>

  <script src="js/app.js?v=9"></script>
  <script src="js/reset_password.js?v=1"></script>
</body>

</html>
