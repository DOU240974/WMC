<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Glücksball Meisterschaften</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <!-- =========================================================
       HEADER: Titel + Navigation + Auth + Theme
       ========================================================= -->
  <header class="header">
    <h1>GlücksBall 2.0</h1>
    <p><strong>Wir wetten nicht nur um Geld, sondern um Ruhm, Ehre und Schadenfreude!</strong></p>

    <nav class="nav">
      <a href="index.html">Start</a>
      <a href="fussballmeisterschaften.html" class="active">Meisterschaften</a>
      <a href="tipps.html">Ehrentipps</a>
      <a href="spasstipp.html">Spaßtipps</a>
      <a href="ranking.html">Ranking</a>
      <a href="fussball-news.html">News</a>
      <a href="forum.html">Forum</a>
      <a href="regeln.html">Regeln</a>

      
      <div class="auth-area" id="authArea">

        <!-- Status: LED + Name -->
        <div class="auth-status" id="authStatus">
          <span class="led" id="loginLed" aria-label="Login Status"></span>
          <span class="auth-name" id="navUsername">Gast</span>
        </div>

        <!-- Gast-Ansicht -->
        <div id="authGuest">
          <button id="authToggle" class="btn btn-ghost" type="button">Login</button>

          <!-- Dropdown Login Box -->
          <div class="auth-box" id="authBox">
            <form id="loginForm">
              <h3>Login</h3>
              <input type="text" id="loginName" placeholder="Benutzername" required>
              <input type="password" id="loginPass" placeholder="Passwort" required>
              <button class="btn" type="submit">Login</button>
            </form>
          </div>
        </div>

        <!-- User-Ansicht (legacy/optional, wird in app.js meist ausgeblendet) -->
        <div id="authUser" style="display:none;">
          <button id="logoutBtn" class="btn btn-ghost" type="button">Logout</button>
        </div>
      </div>

      <!-- Theme Toggle (Text wird in app.js dynamisch gesetzt) -->
      <button id="themeToggle" class="btn btn-ghost" type="button">Lightmode</button>
    </nav>
  </header>

  <!-- =========================================================
       CUPS SECTION: Karten-Grid (wird aus meisterschaften.json gerendert)
       ========================================================= -->
  <section class="cups-section">
    <h1>Internationale Meisterschaften</h1>

    <div class="cards-wrapper">
      <!-- Hier kommen die Cup-Karten rein -->
      <div id="cards" class="cards"></div>
    </div>
  </section>

  <!-- =========================================================
       MODAL: Detail-Infos zu einer Meisterschaft
       - wird per JS geöffnet/geschlossen
       ========================================================= -->
  <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);">
    <div class="card" style="max-width:900px; margin:6% auto; position:relative;">
      <button id="closeModal" class="btn btn-ghost" style="position:absolute; right:10px; top:10px;">✖</button>

      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>

      <p><strong>Region:</strong> <span id="modalRegion"></span></p>
      <p><strong>Konföderation:</strong> <span id="modalConfed"></span></p>
      <p><strong>Typ:</strong> <span id="modalType"></span></p>

      <p style="color:var(--muted); margin-top:0.4rem;">
        <strong>Nächste Ausgabe:</strong> <span id="modalNext"></span>
      </p>

      <hr class="line">

      <h3>Letzte Sieger (Statistik)</h3>
      <div id="modalWinners"></div>
    </div>
  </div>

  <!-- =========================================================
       Scripts
       ========================================================= -->

  <!-- app.js: Theme + Auth + Nav -->
  <script src="js/app.js"></script>

  <script>
    /* =========================================================
       DOM References
       ========================================================= */
    const cardsEl = document.getElementById("cards");          // Container für Cup-Karten
    const filterEl = document.getElementById("filter");        // Optionaler Filter (existiert nur, wenn du ihn im HTML hast)

    const modal = document.getElementById("modal");            // Modal Overlay
    const closeModal = document.getElementById("closeModal");  // Modal Close Button
    const modalTitle = document.getElementById("modalTitle");  // Modal Title
    const modalText = document.getElementById("modalText");    // Modal Text

    const modalRegion = document.getElementById("modalRegion"); // Region
    const modalConfed = document.getElementById("modalConfed"); // Confed
    const modalType = document.getElementById("modalType");     // Typ
    const modalNext = document.getElementById("modalNext");     // Next Edition

    const modalWinners = document.getElementById("modalWinners"); // Sieger-Statistik

    let data = []; // Array aus data/meisterschaften.json

    /* =========================================================
       Helper: HTML Escaping (XSS Schutz bei innerHTML)
       ========================================================= */
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /* =========================================================
       Preview auf Karte: Top 2 Länder (derzeit nicht angezeigt)
       ========================================================= */
    function winnersPreview(m) {
      const map = m.winnersYears;
      if (!map || Object.keys(map).length === 0) return "Keine Daten";

      const arr = Object.entries(map)
        .map(([country, years]) => ({ country, count: years.length, years }))
        .sort((a, b) => b.count - a.count);

      return arr.slice(0, 2).map(x => `${x.country}: ${x.count}`).join(" • ");
    }

    /* =========================================================
       Sieger-Statistik im Modal: sortiert nach Anzahl Titel
       ========================================================= */
    function winnersStatsHtml(m) {
      const map = m.winnersYears;
      if (!map || Object.keys(map).length === 0) {
        return `<p style="color:var(--muted);">Keine Sieger-Daten vorhanden.</p>`;
      }

      const arr = Object.entries(map)
        .map(([country, years]) => ({
          country,
          years: years.slice().sort((a, b) => b - a),
          count: years.length
        }))
        .sort((a, b) => b.count - a.count || a.country.localeCompare(b.country, "de"));

      return `
        <ul>
          ${arr.map(x => `
            <li>
              <strong>${escapeHtml(x.country)}:</strong> ${x.count}
              <span style="color:var(--muted);"> (${escapeHtml(x.years.join(", "))})</span>
            </li>
          `).join("")}
        </ul>
      `;
    }

    /* =========================================================
       Render Cup Cards
       - AFCON Karte wird als "LIVE" markiert
       - Klick auf Karte: wenn AFCON -> afcon.html
       - Klick auf Infos-Button: Modal öffnen
       ========================================================= */
    function render(list) {
      cardsEl.innerHTML = list.map(m => {
        const isLive = m.id === "wm"; // WM Live markieren

        return `
          <article class="card cup-card ${isLive ? "is-live" : ""}" data-card-id="${m.id}">
            ${isLive ? `<span class="live-badge">LIVE</span>` : ""}

            <div class="cup-head">
              <h3 class="cup-title">${m.short}</h3>
              <span class="cup-year">${m.jahr}</span>
            </div>

            <p class="cup-desc">${m.beschreibung}</p>

            <div class="cup-meta">
              <span class="pill">${m.kontinent}</span>
              <span class="pill pill-muted">${m.confed}</span>
            </div>

            <button class="btn cup-btn" data-id="${m.id}">Infos</button>
          </article>
        `;
      }).join("");

      // Klick auf gesamte Karte: nur AFCON -> afcon.html
      document.querySelectorAll("[data-card-id]").forEach(card => {
        card.addEventListener("click", () => {
          const id = card.dataset.cardId;
          if (id === "afcon") {
            window.location.href = "AFCON.html";
          }

          if (id === "wm") {
            window.location.href = "caf.html";
          }
        });
      });

      // Klick auf Infos-Button: immer Modal (stopPropagation verhindert Card-Klick)
      document.querySelectorAll("button[data-id]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          openModal(btn.dataset.id);
        });
      });
    }

    /* =========================================================
       Modal öffnen: füllt Inhalte aus data[] und zeigt Modal
       ========================================================= */
    function openModal(id) {
      const m = data.find(x => x.id === id);
      if (!m) return;

      modalTitle.textContent = m.name;
      modalText.textContent = m.beschreibung;

      modalRegion.textContent = m.region || "-";
      modalConfed.textContent = m.confed || "-";
      modalType.textContent = m.typ || "-";
      modalNext.textContent = m.nextEdition ? m.nextEdition : "-";

      modalWinners.innerHTML = winnersStatsHtml(m);
      modal.style.display = "block";
    }

    /* =========================================================
       Modal schließen
       ========================================================= */
    closeModal.addEventListener("click", () => (modal.style.display = "none"));
    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.style.display = "none";
    });

    /* =========================================================
       Data laden: meisterschaften.json -> render()
       ========================================================= */
    fetch("data/meisterschaften.json")
      .then(res => res.json())
      .then(json => {
        data = json;
        render(data);
      });

    /* =========================================================
       Optionaler Filter (nur wenn #filter existiert)
       Achtung: in deinem HTML ist kein <select id="filter"> drin.
       Wenn filterEl null ist, würde addEventListener crashen.
       ========================================================= */
    if (filterEl) {
      filterEl.addEventListener("change", () => {
        const value = filterEl.value;
        if (value === "alle") render(data);
        else render(data.filter(m => m.kontinent === value));
      });
    }
  </script>

</body>

</html>
